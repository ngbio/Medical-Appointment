name: Medical Appointment CI

on:
  push:
    branches: ["main", "develop", "cozg"]
  pull_request:
    branches: ["main", "develop", "cozg"]

jobs:
#CI
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Static syntax check
        run: python -m compileall backend/src

      - name: Django system check
        run: python backend/src/manage.py check

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (repo root)
        run: docker build . -t medical-appointment-backend:test
#CD
  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/cozg')
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and Push Backend Image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/medical-appointment-backend
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build . -t $IMAGE_ID:latest
          docker push $IMAGE_ID:latest

