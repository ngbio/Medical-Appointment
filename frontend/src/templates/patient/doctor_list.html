{% extends 'base/layout.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold mb-0">Đội ngũ Bác sĩ</h2>
    </div>

    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <select id="specialtySelect" class="form-select shadow-sm">
                <option value="">Tất cả chuyên khoa</option>
                </select>
        </div>
        <div class="col-md-4 mb-3">
            <input type="date" id="dateInput" class="form-control shadow-sm">
        </div>
        <div class="col-md-4 mb-3">
            <button class="btn btn-primary w-100 shadow-sm" id="btnSearch">
                Tìm kiếm
            </button>
        </div>
    </div>

    <div class="row" id="doctorListContainer">
        </div>

    <div class="col-12 text-center mt-3 mb-3" id="loadingSpinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Đang tải...</span>
        </div>
        <p class="text-muted mt-2">Đang tải dữ liệu...</p>
    </div>

    <div class="text-center mt-4 mb-5 d-none" id="loadMoreContainer">
        <button class="btn btn-primary px-5 rounded-pill shadow-sm" id="btnLoadMore">
            Xem thêm bác sĩ
        </button>
    </div>
</div>

<script src="{% static 'js/patient/doctor_list.js' %}" defer></script>
{% endblock %}
